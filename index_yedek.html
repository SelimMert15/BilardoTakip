<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atatürk Bilardo Salonu</title>

    <style>

        body{
            background:#161616;
            color:white;
            font-family:Arial, sans-serif;
            margin:0;
            padding:20px;
        }

        h1{
            text-align:center;
            margin-bottom:40px;
        }

        .kategori{
            margin-top:40px;
        }

        .kategori h2{
            border-left:5px solid #2196f3;
            padding-left:10px;
        }

        .container{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:20px;
            margin-top:20px;
        }

        .card{
            background:#242424;
            border-radius:15px;
            padding:20px;
            box-shadow:0 0 15px rgba(0,0,0,.4);
        }

        .status{
            color:#4caf50;
            font-weight:bold;
            margin:10px 0;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:#2196f3;
            color:white;
            cursor:pointer;
            font-size:16px;
        }

    </style>

</head>
<body>

<h1>🎱 Atatürk Bilardo Salonu</h1>

<div class="kategori">

    <h2>🎱 3 Bantlar</h2>

    <div class="container">

        <div class="card">
            <h3>3 Bant 1</h3>
            {% if masalar[0].aktif %}
<div class="status">🔴 Aktif</div>
{% else %}
<div class="status">🟢 Boş</div>
{% endif %}
            <a href="/masa_ac/1">
    <button>Masayı Aç</button>
</a>

        <div class="card">
            <h3>3 Bant 2</h3>
            <div class="status">🟢 Boş</div>
            <button>Masayı Aç</button>
        </div>

        <div class="card">
            <h3>3 Bant 3</h3>
            <div class="status">🟢 Boş</div>
            <button>Masayı Aç</button>
        </div>

    </div>

</div>

<div class="kategori">

    <h2>🎱 Amerikanlar</h2>

    <div class="container">

        <div class="card">
            <h3>Amerikan 1</h3>
            <div class="status">🟢 Boş</div>
            <button>Masayı Aç</button>
        </div>

        <div class="card">
            <h3>Amerikan 2</h3>
            <div class="status">🟢 Boş</div>
            <button>Masayı Aç</button>
        </div>

    </div>

</div>

<div class="kategori">

    <h2>⚽ Langırt</h2>

    <div class="container">

        <div class="card">
            <h3>Langırt</h3>
            <div class="status">🟢 Boş</div>
            <button>Masayı Aç</button>
        </div>

    </div>

</div>

<div class="kategori">

    <h2>🏓 Masa Tenisi</h2>

    <div class="container">

        <div class="card">
            <h3>Masa Tenisi 1</h3>
            <div class="status">🟢 Boş</div>
            <button>Masayı Aç</button>
        </div>

        <div class="card">
            <h3>Masa Tenisi 2</h3>
            <div class="status">🟢 Boş</div>
            <button>Masayı Aç</button>
        </div>

    </div>

</div>

</body>
</html>
